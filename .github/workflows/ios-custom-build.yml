name: Build Frida iOS Stealth (USB Only - Stable Medium)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      FRIDA_NAME: internald

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Apply stealth
        run: |
          cd frida_src

          # 关闭默认端口
          sed -i '' 's/default = 27042/default = 0/' subprojects/frida-core/server/server.vala || true

          # 字符串混淆
          grep -rIl "gum-js-loop" subprojects | xargs -I{} sed -i '' 's/gum-js-loop/core-js-loop/g' "{}" || true
          grep -rIl 'default = "frida"' subprojects | xargs -I{} sed -i '' 's/default = "frida"/default = "core"/g' "{}" || true

          # helper 标识
          sed -i '' 's/re.frida.Helper/re.core.Helper/g' subprojects/frida-core/src/darwin/frida-helper.xcent || true

      # ---------------- arm64 ----------------
      - name: Build arm64
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            --builddir=build-arm64 \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          ninja -C build-arm64
          DESTDIR=build-arm64 ninja -C build-arm64 install

      # ---------------- arm64e ----------------
      - name: Build arm64e
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64e \
            --enable-portal \
            --builddir=build-arm64e \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=disabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          ninja -C build-arm64e
          DESTDIR=build-arm64e ninja -C build-arm64e install

      # ---------------- 合并 ----------------
      - name: Merge universal
        run: |
          cd frida_src

          mkdir -p final/usr/bin
          mkdir -p final/usr/lib/frida

          lipo \
            build-arm64/usr/bin/frida-server \
            build-arm64e/usr/bin/frida-server \
            -create -output final/usr/bin/$FRIDA_NAME

          lipo \
            build-arm64/usr/lib/frida/frida-agent.dylib \
            build-arm64e/usr/lib/frida/frida-agent.dylib \
            -create -output final/usr/lib/frida/frida-agent.dylib

          lipo \
            build-arm64/usr/lib/frida/frida-helper \
            build-arm64e/usr/lib/frida/frida-helper \
            -create -output final/usr/lib/frida/frida-helper

          strip -x final/usr/bin/$FRIDA_NAME || true
          strip -x final/usr/lib/frida/frida-agent.dylib || true
          strip -x final/usr/lib/frida/frida-helper || true

      # ---------------- 打包 ----------------
      - name: Package DEB
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp final/usr/bin/$FRIDA_NAME pkg/usr/bin/
          cp final/usr/lib/frida/frida-agent.dylib pkg/usr/lib/frida/
          cp final/usr/lib/frida/frida-helper pkg/usr/lib/frida/

          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: stealth frida (usb only)
          Maintainer: you
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-stealth.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-usb-only
          path: frida_src/frida-stealth.deb
