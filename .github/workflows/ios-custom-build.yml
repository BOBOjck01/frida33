name: 构建 Frida iOS（极简稳定 + USB Only + 双架构 + 轻度去特征）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 拉源码 =====
      - name: 拉取源码
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      # ===== 清理 =====
      - name: 清理
        run: |
          cd frida_src
          rm -rf build

      # ===== 配置 =====
      - name: 配置
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools

      # ===== 编译 =====
      - name: 编译
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src
          ninja -C build

      # ===== 安装 dpkg =====
      - name: 安装 dpkg
        run: brew install dpkg

      # ===== 打包 =====
      - name: 打包（稳定 + 去特征）
        run: |
          cd frida_src

          SERVER_PATH=$(find build -name frida-server | head -n 1)
          [ -z "$SERVER_PATH" ] && echo "❌ no server" && exit 1

          # ===== 二进制处理 =====
          cp "$SERVER_PATH" internald

          # ===== 核心伪装（等长，安全）=====
          perl -pi -e 's/frida-server/internald___/g' internald
          perl -pi -e 's/re\.frida\.server/re.core.server/g' internald

          # ===== 轻度去特征（安全）=====
          perl -pi -e 's/frida-agent/core-agent/g' internald
          perl -pi -e 's/frida-helper/core-helper/g' internald

          # ===== 端口特征（可选安全）=====
          perl -pi -e 's/27042/39042/g' internald
          perl -pi -e 's/27043/39043/g' internald

          # ===== 精简 =====
          strip -Sx internald || true
          strip -ur internald || true

          # ===== ARM（iOS14 rootful）=====
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin

          cp internald pkg/usr/bin/internald

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # ===== ARM64（iOS16 rootless兼容）=====
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/var/jb/usr/bin

          # 主路径（你要求保留）
          cp internald pkg/usr/bin/internald

          # rootless 兼容路径
          cp internald pkg/var/jb/usr/bin/internald

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm64.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-minimal
          path: |
            frida_src/frida-arm.deb
            frida_src/frida-arm64.deb
