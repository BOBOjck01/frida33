name: 构建 Frida iOS（安全隐匿版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ===== 1. 环境准备 & 源码拉取 =====
      - name: 准备环境与源码
        run: |
          brew update
          brew install dpkg ldid

          git clone --depth 1 --branch ${{ env.FRIDA_VERSION }} https://github.com/frida/frida.git frida_src
          cd frida_src
          git submodule update --init --recursive

      - name: 源码级去特征
        run: |
          cd frida_src
        
          CORE_DIR=$(find . -type d -name frida-core | head -n 1)
          if [ -z "$CORE_DIR" ]; then echo "❌ frida-core not found"; exit 1; fi
        
          cd "$CORE_DIR"
        
          grep -rlZ "27042" . | xargs -0 -I {} sed -i '' 's/27042/39042/g' "{}" || true
          grep -rlZ "27043" . | xargs -0 -I {} sed -i '' 's/27043/39043/g' "{}" || true
          grep -rlZ "re\.frida\.server" . | xargs -0 -I {} sed -i '' 's/re.frida.server/re.core.server/g' "{}" || true
          grep -rlZ "FridaAgent" . | xargs -0 sed -i '' 's/FridaAgent/CoreAgent/g' || true


      - name: JS runtime 去特征
        run: |
          cd frida_src
          find subprojects -type f -name "*.js" -print0 | xargs -0 sed -i '' 's/Frida/Core/g' || true
          find subprojects -type f -name "*.js" -print0 | xargs -0 sed -i '' 's/frida/core/g' || true
          find subprojects -type f -name "*.js" -print0 | xargs -0 sed -i '' 's/FridaAgent/CoreAgent/g' || true
          sed -i '' 's/--sourcemap//g' subprojects/frida-gum/bindings/gumjs/meson.build || true
          sed -i '' 's/--debug//g' subprojects/frida-gum/bindings/gumjs/meson.build || true

      - name: 删除缓存 
        run: |
          rm -rf build
          rm -rf subprojects/frida-gum/node_modules
          
      # ===== 3. 配置 & 编译 =====
      - name: 编译 Frida Server
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools \
            -- \
            -Dbuildtype=release \
            -Db_ndebug=true

          ninja -C build -j$(sysctl -n hw.ncpu) || { echo "❌ 编译失败"; exit 1; }

          # 基本校验
          test -x "$(find build -type f -name 'frida-server*' | head -n 1)" || { echo "❌ 编译产物不可执行"; exit 1; }

      # ===== 4. 二进制处理 & 重签名 =====
      - name: 二进制处理与重签名
        run: |
          cd frida_src

          SERVER=$(find build -type f -path "*/frida-core/*/server/*" -name "frida-server*" | head -n 1)

          if [ -z "$SERVER" ]; then
            SERVER=$(find build -type f -name "frida-server*" | head -n 1)
          fi

          if [ -z "$SERVER" ]; then
            echo "❌ 未找到编译产物"
            exit 1
          fi

          cp "$SERVER" sysmond

          strip -S -x sysmond 2>/dev/null || true

          perl -pi -e 's/frida-server/sysmond____/g' sysmond || true
          perl -pi -e 's/frida-agent/sysmond-agent/g' sysmond || true
          perl -pi -e 's/re\.frida\.server/re.core.server/g' sysmond || true

          chmod 755 sysmond

          ldid -e "$SERVER" > ents.xml 2>/dev/null || true

          if [ -s ents.xml ]; then
            ldid -Sents.xml sysmond
          else
            ldid -S sysmond
          fi

          ldid -e sysmond >/dev/null 2>&1 || { echo "❌ 签名失败"; exit 1; }
          echo "==== residual check ===="
          strings sysmond | grep -i frida && echo "⚠️ still contains frida"
      # ===== 5. 打包 =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # ---------- rootful ----------
          rm -rf pkg_rf
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin

          install -m 755 sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg_rf frida-rootfularm.deb

          # ---------- rootless ----------
          rm -rf pkg_rl
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin

          install -m 755 sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF

          dpkg-deb -b pkg_rl frida-rootlessarm64.deb

          # 校验产物
          ls -lh *.deb

      # ===== 6. 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: frida_src/*.deb

  inspect:
    name: 检测残留特征
    runs-on: macos-14
    needs: build

    steps:
      - name: 安装依赖
        run: |
            brew update
            brew install dpkg
            
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: frida-ios-final

      - name: 解包 deb
        run: |
          mkdir out
          for f in *.deb; do
            dpkg-deb -x "$f" out
          done

      - name: 定位二进制
        run: |
          BIN=$(find out -type f -name sysmond | head -n 1)

          if [ -z "$BIN" ]; then
            echo "❌ 未找到 sysmond"
            exit 0
          fi

          echo "BIN=$BIN" >> $GITHUB_ENV

      - name: 字符串检测（详细）
        run: |
          BIN=$(find out -type f -name sysmond | head -n 1)
          echo "==== 基础命中 ===="
          strings "$BIN" | grep -i frida | head -n 50 || true

          echo
          echo "==== runtime 路径 ===="
          strings "$BIN" | grep -i "frida/runtime" | head -n 20 || true

          echo
          echo "==== node_modules ===="
          strings "$BIN" | grep -i "node_modules" | head -n 20 || true

          echo
          echo "==== bridge ===="
          strings "$BIN" | grep -i "bridge" | head -n 20 || true

          echo
          echo "==== Agent ===="
          strings "$BIN" | grep -i "Agent" | head -n 20 || true

      - name: 统计命中数量
        run: |
          BIN=$(find out -type f -name sysmond | head -n 1)
          COUNT=$(strings "$BIN" | grep -i frida | wc -l | tr -d ' ')
          echo "Frida 命中总数: $COUNT"
          echo
          echo "==== Top 关键词 ===="
          strings "$BIN" | grep -i frida | cut -c1-80 | sort | uniq -c | sort -nr | head