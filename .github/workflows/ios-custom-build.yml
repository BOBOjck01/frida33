name: Build Custom Frida iOS 16.6.6
on: workflow_dispatch

jobs:
  build-ios:
    runs-on: macos-14

    env:
      FRIDA_NAME: internald
      PIPE_NAME: core-js-loop

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: "16.6.6"
          submodules: recursive

      - name: Init submodules
        run: git submodule update --init --recursive

      - name: Patch (Minimal & Safe)
        run: |
          set -e

          echo "[*] Patch pipe name"
          grep -rl "gum-js-loop" subprojects | \
          xargs sed -i '' "s/gum-js-loop/${PIPE_NAME}/g" || true

          echo "[*] Patch visible server name"
          sed -i '' "s/frida-server/${FRIDA_NAME}/g" \
            subprojects/frida-core/server/*.vala || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build iOS arm64
        run: |
          make clean
          make ios-arm64

      - name: Strip binary
        run: |
          strip build/frida-ios-arm64/bin/frida-server || true

      - name: Rename binary
        run: |
          mv build/frida-ios-arm64/bin/frida-server \
             build/frida-ios-arm64/bin/${FRIDA_NAME}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-usb-safe
          path: |
            build/frida-ios-arm64/bin/*
            build/frida-ios-arm64/lib/frida/frida-agent.dylib
