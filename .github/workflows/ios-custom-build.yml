name: Build Frida iOS ARM64 ONLY (FINAL FIX)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      FRIDA_NAME: internald

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build build-arm64
          rm -rf subprojects/frida-core/compat/*.p || true

      - name: Patch (关键修复)
        run: |
          cd frida_src
          set +e

          # ---------- 禁 arm64e ----------
          sed -i '' 's/arm64", "arm64e/arm64/g' subprojects/frida-core/compat/build.py
          sed -i '' 's/"arm64e"//g' subprojects/frida-core/compat/build.py

          # ---------- 禁 codesign ----------
          sed -i '' 's/codesign = .*/codesign = ["true"]/g' subprojects/frida-core/tools/post-process.py
          sed -i '' 's/codesign_args = .*/codesign_args = []/g' subprojects/frida-core/tools/post-process.py

          # ---------- USB only ----------
          sed -i '' 's/default = 27042/default = 0/' subprojects/frida-core/server/server.vala
          sed -i '' 's/start_listen (/\/\/start_listen (/g' subprojects/frida-core/server/server.vala

          set -e

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

      - name: Build
        run: |
          cd frida_src

          ninja -C build

          DESTDIR=build-arm64 ninja -C build install

          strip -S build-arm64/usr/bin/frida-server || true

      - name: Package
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp build-arm64/usr/bin/frida-server pkg/usr/bin/$FRIDA_NAME
          cp build-arm64/usr/lib/frida/frida-agent.dylib pkg/usr/lib/frida/
          cp build-arm64/usr/lib/frida/frida-helper pkg/usr/lib/frida/

          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: stealth frida arm64 only
          Maintainer: you
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm64.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-arm64-only
          path: frida_src/frida-arm64.deb