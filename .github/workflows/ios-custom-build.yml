name: Build Frida iOS (Stealth Patch Mode)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout This Repo
        uses: actions/checkout@v4

      - name: Clone Frida Official
        run: |
          # 递归克隆 16.2.1 源码
          git clone --recurse-submodules --depth 1 --branch 16.2.1 https://github.com/frida/frida.git frida_src

      - name: Apply Stealth Patch
        run: |
          cd frida_src
          # 强制应用补丁，忽略微小差异
          git apply --ignore-whitespace ../stealth.patch

      - name: Setup Environment
        run: |
          brew install meson ninja pkg-config
          python3 -m pip install setuptools wheel

      - name: Official Build (arm64 & arm64e)
        run: |
          cd frida_src
          # 调用官方脚本，自动处理 SDK 和路径
          make ios-arm64
          make ios-arm64e || true

      - name: Collect Binaries
        run: |
          mkdir -p output
          # 提取编译后的二进制文件
          find frida_src/build/ -name "frida-server" -exec cp {} output/ \;
          find frida_src/build/ -name "frida-agent.dylib" -exec cp {} output/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-stealth-binaries
          path: output/
