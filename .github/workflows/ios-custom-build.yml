name: 构建 Frida iOS（稳定 + USB Only + 双环境 + 安全隐匿）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 拉源码 =====
      - name: 拉取源码
        run: |
          brew install dpkg
          git clone --depth 1 --branch $FRIDA_VERSION https://github.com/frida/frida.git frida_src
          cd frida_src
          git submodule update --init --recursive

      # ===== 配置 & 编译 =====
      - name: 编译
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools
          ninja -C build

      # ===== 二进制处理 =====
      - name: 去特征
        run: |
          cd frida_src

          SERVER=$(find build -name frida-server | head -n 1)
          cp "$SERVER" sysmond

          # ===== 等长替换（核心）=====
          perl -pi -e 's/frida-server/sysmond____/g' sysmond
          perl -pi -e 's/re\.frida\.server/re.core.server_/g' sysmond
          

          # ===== 端口（可选）=====
          perl -pi -e 's/27042/39042/g' sysmond
          perl -pi -e 's/27043/39043/g' sysmond

          chmod 755 sysmond

          # ===== 精简（双保险）=====
          strip -S sysmond || true
          strip -x sysmond || true

          # ===== 检测残留 =====
          echo "==== check ===="
          file sysmond || true
          strings sysmond | head -n 5 || true
          strings sysmond | grep -i frida || true

      # ===== 打包 =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # ---------- rootful ----------
          rm -rf pkg_rf
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          cp sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg_rf frida-rootful.deb

          # ---------- rootless ----------
          rm -rf pkg_rl
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          cp sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF

          dpkg-deb -b pkg_rl frida-rootless.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: frida_src/*.deb
