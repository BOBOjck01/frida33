name: 构建 Frida iOS（进阶隐匿版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      - name: 环境准备
        run: |
          brew update
          brew install dpkg ldid

      - name: 拉取源码
        run: |
          git clone --depth 1 --branch ${{ env.FRIDA_VERSION }} https://github.com/frida/frida.git frida_src
          cd frida_src
          git submodule update --init --recursive --depth 1

      - name: 源码优化（安全级）
        run: |
          cd frida_src

          # 关闭 gumjs debug
          sed -i '' "s/debug: true/debug: false/g" subprojects/frida-gum/bindings/gumjs/meson.build || true
          sed -i '' 's/"frida-server"/"sysmond"/g' subprojects/frida-core/server/server.vala || true
          sed -i '' 's/Listening on/Service started/g' subprojects/frida-core/server/server.vala || true

      - name: 编译
        run: |
          cd frida_src
          rm -rf build
          export IOS_CERTID=-

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools \
            -- \
            -Dbuildtype=release \
            -Doptimization=3 \
            -Db_ndebug=true \
            -Dstrip=true \
            -Db_lto=true \
            -Dcpp_rtti=false \
            -Db_pie=true

          ninja -C build -j$(sysctl -n hw.ncpu)

      - name: 二进制处理（隐匿增强）
        run: |
          cd frida_src

          SERVER_PATH=$(find ./build -type f -name "frida-server" -exec file {} + | grep "Mach-O" | cut -d: -f1 | head -n 1)
          if [ -z "$SERVER_PATH" ]; then exit 1; fi

          cp "$SERVER_PATH" sysmond

          # 安全 strip
          strip -x sysmond
          strip -ur sysmond

          # 权限
          echo '<?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
          <key>get-task-allow</key><true/>
          <key>task_for_pid-allow</key><true/>
          </dict>
          </plist>' > ents.xml

          ldid -Sents.xml sysmond

      # ===== 打包 =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # ---------- rootful ----------
          rm -rf pkg_rf
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          cp sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: com.apple.system.service
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg_rf frida-rootfularm.deb

          # ---------- rootless ----------
          rm -rf pkg_rl
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          cp sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: com.apple.system.service
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF

          dpkg-deb -b pkg_rl frida-rootlessarm64.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: frida_src/*.deb
