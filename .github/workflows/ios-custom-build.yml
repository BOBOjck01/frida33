name: Build Frida iOS 16.2.1 (arm + arm64e)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    env:
      FRIDA_NAME: internald
      PORT_NUMBER: "27088"

    steps:
      - name: Clone Frida
        run: |
          git clone https://github.com/frida/frida.git .
          git fetch --tags
          git checkout 16.2.1
          git submodule update --init --recursive

      - name: Install deps
        run: |
          brew install meson ninja pkg-config dpkg
          python3 -m pip install --upgrade pip setuptools wheel

      - name: Patch
        run: |
          sed -i '' "s/27042/${PORT_NUMBER}/g" subprojects/frida-core/lib/base/rpc.vala || true
          find subprojects/frida-core/server -name "*.vala" -exec sed -i '' "s/frida-server/${FRIDA_NAME}/g" {} + || true

      - name: Build arm64
        run: |
          make clean || true
          export FRIDA_IOS_ARCHS="arm64"
          make core-ios
          mv build build-arm64

      - name: Build arm64e
        run: |
          make clean || true
          export FRIDA_IOS_ARCHS="arm64e"
          export CFLAGS="-arch arm64e"
          export CXXFLAGS="-arch arm64e"
          export LDFLAGS="-arch arm64e"
          make core-ios
          mv build build-arm64e

      - name: Package
        run: |
          for arch in arm64 arm64e; do
            BUILD_DIR="build-$arch/frida-ios"

            mkdir -p deb-$arch/DEBIAN
            mkdir -p deb-$arch/usr/sbin
            mkdir -p deb-$arch/usr/lib/frida

            cp $BUILD_DIR/bin/frida-server deb-$arch/usr/sbin/${FRIDA_NAME}
            cp $BUILD_DIR/lib/frida/frida-agent.dylib deb-$arch/usr/lib/frida/frida-agent.dylib

            strip deb-$arch/usr/sbin/${FRIDA_NAME}
            chmod 755 deb-$arch/usr/sbin/${FRIDA_NAME}

            echo "Package: com.custom.${FRIDA_NAME}.$arch" > deb-$arch/DEBIAN/control
            echo "Name: ${FRIDA_NAME} ($arch)" >> deb-$arch/DEBIAN/control
            echo "Version: 16.2.1" >> deb-$arch/DEBIAN/control
            echo "Architecture: arm64" >> deb-$arch/DEBIAN/control
            echo "Description: Frida 16.2.1 ($arch)" >> deb-$arch/DEBIAN/control
            echo "Maintainer: Developer" >> deb-$arch/DEBIAN/control

            dpkg-deb -b deb-$arch ${FRIDA_NAME}_$arch.deb
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-16.2.1
          path: "*.deb"
