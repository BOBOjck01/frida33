name: Build Frida iOS Stealth (Fast + Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: 16.6.6
      FRIDA_NAME: internald
      PORT: 27088
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      # ===== 缓存 =====
      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: frida-ccache-${{ runner.os }}-${{ env.FRIDA_VERSION }}

      # ===== 源码 =====
      - name: Checkout (full + stable)
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src

          git fetch --tags
          git checkout $FRIDA_VERSION

          git submodule sync
          git submodule update --init --recursive

      - name: Prepare
        run: |
          brew install ccache ninja || true
          echo 'export PATH="/opt/homebrew/opt/ccache/libexec:$PATH"' >> ~/.zshrc

      # ===== stealth =====
      - name: Apply stealth
        run: |
          cd frida_src

          sed -i '' "s/default = 27042/default = $PORT/" \
          subprojects/frida-core/server/server.vala

          sed -i '' 's/gum-js-loop/core-js-loop/' \
          subprojects/frida-gum/gum/gumjs/gumscriptbackend.c

          sed -i '' 's/frida-agent.dylib/internal-agent.dylib/' \
          subprojects/frida-gum/gum/backend-darwin/gummemory-darwin.c

          sed -i '' 's/default = "frida"/default = "core"/' \
          subprojects/frida-core/lib/base/session.vala

      # ===== arm64 =====
      - name: Build arm64
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          make -j$(sysctl -n hw.ncpu)
          DESTDIR=build-arm64 make install

      # ===== arm64e =====
      - name: Build arm64e
        run: |
          cd frida_src

          make clean || true

          ./configure \
            --prefix=/usr \
            --host=ios-arm64e \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=disabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          make -j$(sysctl -n hw.ncpu)
          DESTDIR=build-arm64e make install

      # ===== 合并 =====
      - name: Merge
        run: |
          cd frida_src

          mkdir -p final/usr/bin
          mkdir -p final/usr/lib/frida

          lipo \
            build-arm64/usr/bin/frida-server \
            build-arm64e/usr/bin/frida-server \
            -create -output final/usr/bin/$FRIDA_NAME

          lipo \
            build-arm64/usr/lib/frida/internal-agent.dylib \
            build-arm64e/usr/lib/frida/internal-agent.dylib \
            -create -output final/usr/lib/frida/internal-agent.dylib

          codesign -f -s "-" final/usr/bin/$FRIDA_NAME
          codesign -f -s "-" final/usr/lib/frida/internal-agent.dylib

      # ===== deb =====
      - name: Package deb
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp final/usr/bin/$FRIDA_NAME pkg/usr/bin/
          cp final/usr/lib/frida/internal-agent.dylib pkg/usr/lib/frida/

          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: stealth frida server
          Maintainer: you
          Section: Development
          EOF

          dpkg-deb -b pkg frida-stealth.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-stealth
          path: frida_src/frida-stealth.deb
