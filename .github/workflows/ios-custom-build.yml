name: Build Frida iOS Standard

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Frida
        # 使用完整克隆并递归子模块，确保所有目录都在
        run: |
          git clone --recurse-submodules --branch 16.2.1 https://github.com/frida/frida.git .

      - name: Setup Environment
        run: |
          brew install meson ninja pkg-config dpkg
          # 官方构建通常需要这些环境
          python3 -m pip install setuptools wheel

      - name: Build iOS Arm64
        run: |
          # 直接使用根目录的 make，这是最稳的入口
          # 它会自动下载需要的预编译 SDK 并处理所有 subprojects 路径
          make ios-arm64

      - name: Build iOS Arm64e
        run: |
          # 针对新芯片的架构
          make ios-arm64e || true

      - name: Collect Binaries
        run: |
          mkdir -p output
          # 官方构建后的产物固定在 build 目录下
          find build/ -name "frida-server" -exec cp {} output/ \;
          find build/ -name "frida-agent.dylib" -exec cp {} output/ \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-binaries
          path: output/
