name: 替换仓库为 Frida 16.6.6

on:
  workflow_dispatch:

jobs:
  replace:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 拉取当前仓库
        uses: actions/checkout@v4

      - name: 清空仓库（保留 .git）
        run: |
          shopt -s dotglob
          rm -rf !( .git )

      - name: 拉取 Frida 16.6.6
        run: |
          git clone --depth 1 --branch 16.6.6 https://github.com/frida/frida.git tmp_frida

      - name: 覆盖文件
        run: |
          cp -R tmp_frida/* .
          cp -R tmp_frida/.* . 2>/dev/null || true
          rm -rf tmp_frida

      - name: 清理无用内容
        run: |
          rm -rf .github
          rm -rf .gitmodules || true

      - name: 提交并推送
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "replace with frida 16.6.6 source" || echo "no changes"
          git push