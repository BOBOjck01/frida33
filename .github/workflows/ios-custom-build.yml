name: Build Frida

on: workflow_dispatch

jobs:
  build-ios:
    runs-on: macos-14

    env:
      FRIDA_NAME: internald
      PORT_NUMBER: "27088"

    steps:
      # 1. 官方源码
      - name: Clone
        run: |
          git clone https://github.com/frida/frida.git .
          git fetch --tags
          git checkout 16.2.1
          git submodule update --init --recursive

      # 2. 依赖
      - name: Install deps
        run: |
          brew install meson ninja pkg-config dpkg
          python3 -m pip install --upgrade pip setuptools wheel

      # 3. Patch（最小）
      - name: Patch
        run: |
          sed -i '' "s/27042/${PORT_NUMBER}/g" subprojects/frida-core/lib/base/rpc.vala || true
          find subprojects/frida-core/server -name "*.vala" \
            -exec sed -i '' "s/frida-server/${FRIDA_NAME}/g" {} + || true

      # 4️⃣ 编译 arm64
      - name: Build arm64
        run: |
          make clean || true
          export FRIDA_IOS_ARCHS="arm64"
          make core-ios

          mv build build-arm64

      # 5️⃣ 编译 arm64e（强制）
      - name: Build arm64e
        run: |
          make clean || true

          export FRIDA_IOS_ARCHS="arm64e"
          export CFLAGS="-arch arm64e"
          export CXXFLAGS="-arch arm64e"
          export LDFLAGS="-arch arm64e"

          make core-ios

          mv build build-arm64e

      # 6️⃣ 打包
      - name: Package
        run: |
          for arch in arm64 arm64e; do
            BUILD_DIR="build-$arch/frida-ios"

            mkdir -p deb-$arch/DEBIAN deb-$arch/usr/sbin deb-$arch/usr/lib/frida

            cp $BUILD_DIR/bin/frida-server deb-$arch/usr/sbin/${FRIDA_NAME}
            cp $BUILD_DIR/lib/frida/frida-agent.dylib deb-$arch/usr/lib/frida/frida-agent.dylib

            strip deb-$arch/usr/sbin/${FRIDA_NAME}
            chmod 755 deb-$arch/usr/sbin/${FRIDA_NAME}

            cat > deb-$arch/DEBIAN/control <<EOF
Package: com.custom.${FRIDA_NAME}.$arch
Name: ${FRIDA_NAME} ($arch)
Version: 16.2.1
Architecture: arm64
Description: Frida 16.2.1 ($arch)
Maintainer: Developer
EOF

            dpkg-deb -b deb-$arch ${FRIDA_NAME}_$arch.deb
          done

      # 7. 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-dual
          path: "*.deb"
