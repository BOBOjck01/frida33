name: Build Frida iOS (Pure Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      IOS_CERTID: "-"   # ✅ 关键：关闭签名

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal

      - name: Build
        run: |
          cd frida_src

          ninja -C build

      - name: Install
        run: |
          cd frida_src

          DESTDIR=build-out ninja -C build install

      - name: Package
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp build-out/usr/bin/frida-server pkg/usr/bin/
          cp build-out/usr/lib/frida/frida-agent.dylib pkg/usr/lib/frida/
          cp build-out/usr/lib/frida/frida-helper pkg/usr/lib/frida/

          cat > pkg/DEBIAN/control <<EOF
          Package: re.frida.server
          Name: frida-server
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: Frida server
          Maintainer: frida
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios
          path: frida_src/frida.deb
