name: Build Frida iOS Stealth (USB Only)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: 16.6.6
      FRIDA_NAME: internald
      PORT: 0   # 关键：禁 TCP

    steps:
      # ===== 源码 =====
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags
          git checkout $FRIDA_VERSION
          git submodule sync
          git submodule update --init --recursive

      # ===== stealth + USB only =====
      - name: Apply stealth
        run: |
          cd frida_src

          # ===== 禁 TCP（最关键）=====
          sed -i '' 's/default = 27042/default = 0/' \
          subprojects/frida-core/server/server.vala || true

          # ===== JS loop =====
          FILES=$(grep -rIl "gum-js-loop" subprojects || true)
          for f in $FILES; do
            sed -i '' 's/gum-js-loop/core-js-loop/g' "$f"
          done

          # ===== agent 名 =====
          FILES=$(grep -rIl "frida-agent.dylib" subprojects || true)
          for f in $FILES; do
            sed -i '' 's/frida-agent.dylib/internal-agent.dylib/g' "$f"
          done

          # ===== session tag =====
          FILES=$(grep -rIl 'default = "frida"' subprojects || true)
          for f in $FILES; do
            sed -i '' 's/default = "frida"/default = "core"/g' "$f"
          done

          # ===== 强制禁 TCP（双保险）=====
          FILES=$(grep -rIl "listen_on_tcp" subprojects/frida-core || true)
          for f in $FILES; do
            sed -i '' 's/listen_on_tcp (/\/\/listen_on_tcp (/g' "$f"
          done

      # ===== arm64 =====
      - name: Build arm64
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          make -j$(sysctl -n hw.ncpu)
          DESTDIR=build-arm64 make install

      # ===== arm64e =====
      - name: Build arm64e
        run: |
          cd frida_src

          make clean || true

          ./configure \
            --prefix=/usr \
            --host=ios-arm64e \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=disabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          make -j$(sysctl -n hw.ncpu)
          DESTDIR=build-arm64e make install

      # ===== 合并 =====
      - name: Merge universal
        run: |
          cd frida_src

          mkdir -p final/usr/bin
          mkdir -p final/usr/lib/frida

          lipo \
            build-arm64/usr/bin/frida-server \
            build-arm64e/usr/bin/frida-server \
            -create -output final/usr/bin/$FRIDA_NAME

          lipo \
            build-arm64/usr/lib/frida/internal-agent.dylib \
            build-arm64e/usr/lib/frida/internal-agent.dylib \
            -create -output final/usr/lib/frida/internal-agent.dylib

          codesign -f -s "-" final/usr/bin/$FRIDA_NAME
          codesign -f -s "-" final/usr/lib/frida/internal-agent.dylib

      # ===== deb =====
      - name: Package DEB
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp final/usr/bin/$FRIDA_NAME pkg/usr/bin/
          cp final/usr/lib/frida/internal-agent.dylib pkg/usr/lib/frida/

          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: stealth frida (usb only)
          Maintainer: you
          Section: Development
          EOF

          dpkg-deb -b pkg frida-stealth.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-usb-only
          path: frida_src/frida-stealth.deb
