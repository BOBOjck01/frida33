name: 构建 Frida iOS（稳定 + USB Only + 双环境 + 安全隐匿）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 环境 =====
      - name: 安装依赖
        run: |
          brew install dpkg python || true

      # ===== 拉源码（稳定写法）=====
      - name: 拉取源码
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags
          git checkout $FRIDA_VERSION
          git submodule update --init --recursive

      # ===== 编译 =====
      - name: 编译
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools

          ninja -C build -j$(sysctl -n hw.ncpu)

      # ===== 二进制处理 =====
      - name: 去特征
        run: |
          cd frida_src

          SERVER=$(find build -type f -name frida-server | head -n 1)
          [ -z "$SERVER" ] && echo "❌ no server" && exit 1

          cp "$SERVER" sysmond

          echo "==== BEFORE ===="
          file sysmond

          # ===== 更稳的 cstring 获取 =====
          OFFSET=$(otool -l sysmond | awk '
            $1=="sectname" && $2=="__cstring"{f=1}
            f && $1=="offset"{print $2; exit}
          ')
          SIZE=$(otool -l sysmond | awk '
            $1=="sectname" && $2=="__cstring"{f=1}
            f && $1=="size"{print $2; exit}
          ')

          [ -z "$OFFSET" ] && echo "❌ no offset" && exit 1
          [ -z "$SIZE" ] && echo "❌ no size" && exit 1

          # ===== Python patch =====
          python3 <<PY
import sys

path = "sysmond"
offset = int("$OFFSET")
size = int("$SIZE")

data = bytearray(open(path,"rb").read())
seg = data[offset:offset+size]

def replace(old, new):
    if len(old)!=len(new):
        raise SystemExit("len mismatch")
    i=0
    c=0
    while True:
        j=seg.find(old, i)
        if j==-1: break
        seg[j:j+len(old)] = new
        i=j+len(old)
        c+=1
    print(old, "->", new, "count=", c)

replace(b"frida-server", b"sysmond____")
replace(b"re.frida.server", b"re.core.server_")

data[offset:offset+size] = seg
open(path,"wb").write(data)

print("patch done")
PY

          chmod 755 sysmond
          strip -S sysmond || true

          echo "==== AFTER ===="
          file sysmond
          strings sysmond | grep -i frida || true

      # ===== 打包 =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # rootful
          rm -rf pkg_rf
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          cp sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          EOF

          dpkg-deb -b pkg_rf frida-rootful.deb

          # rootless
          rm -rf pkg_rl
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          cp sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          EOF

          dpkg-deb -b pkg_rl frida-rootless.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-${{ env.FRIDA_VERSION }}
          path: frida_src/*.deb
