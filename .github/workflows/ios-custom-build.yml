name: 构建 Frida iOS（安全隐匿版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 1. 环境准备 & 源码拉取 =====
      - name: 准备环境与源码
        run: |
          brew update
          brew install dpkg ldid

          git clone --depth 1 --branch ${{ env.FRIDA_VERSION }} https://github.com/frida/frida.git frida_src
          cd frida_src
          git submodule update --init --recursive

      - name: 源码级去特征
        run: |
          cd frida_src
        
          CORE_DIR=$(find . -type d -name frida-core | head -n 1)
          if [ -z "$CORE_DIR" ]; then echo "❌ frida-core not found"; exit 1; fi
        
          cd "$CORE_DIR"
        
          grep -rlZ "27042" . | xargs -0 -I {} sed -i '' 's/27042/39042/g' "{}" || true
          grep -rlZ "27043" . | xargs -0 -I {} sed -i '' 's/27043/39043/g' "{}" || true
          grep -rlZ "re\.frida\.server" . | xargs -0 -I {} sed -i '' 's/re.frida.server/re.core.server/g' "{}" || true
          grep -rlZ "FridaAgent" . | xargs -0 sed -i '' 's/FridaAgent/CoreAgent/g' || true

      - name: JS runtime 去特征
        run: |
          cd frida_src
          FILE=subprojects/frida-gum/bindings/gumjs/meson.build
          # 1. 删除 debug，替换 sourcemap
          sed -i '' 's/--debug//g' "$FILE" || true
          sed -i '' 's/--sourcemap/--no-source-maps/g' "$FILE" || true
          # 2. 强制修改 frida-compile 调用
          sed -i '' '0,/frida-compile/s//frida-compile --no-source-maps/' "$FILE"

      - name: 清理缓存
        run: |
          cd frida_src
          rm -rf build
          rm -rf subprojects/frida-gum/node_modules
          
      # ===== 2. 配置 & 编译 =====
      - name: 编译 Frida Server
        run: |
          cd frida_src
          export CFLAGS="-O3 -s"
          export CXXFLAGS="-O3 -s"

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools \
            -- \
            -Dbuildtype=release \
            -Db_ndebug=true

          ninja -C build -j$(sysctl -n hw.ncpu) || { echo "❌ 编译失败"; exit 1; }

      # ===== 3. 二进制处理 & 重签名 =====
      - name: 二进制处理与重签名
        run: |
          cd frida_src
          
          # 精确查找 Mach-O 格式的二进制文件
          SERVER_PATH=$(find ./build -type f -name "frida-server" -exec file {} + | grep "Mach-O" | cut -d: -f1 | head -n 1)

          if [ -z "$SERVER_PATH" ] || [ ! -f "$SERVER_PATH" ]; then
            echo "❌ 未找到可执行二进制 frida-server"
            find ./build -maxdepth 5 -name "*server*"
            exit 1
          fi

          echo "✅ 找到目标文件: $SERVER_PATH"
          cp "$SERVER_PATH" sysmond
          chmod 755 sysmond

          # 执行 Strip (移除符号表)
          strip -s sysmond || { echo "❌ strip 失败"; exit 1; }

          # 字符串级深度替换
          perl -pi -e 's#/_frida\.js#/_core.js#g' sysmond
          perl -pi -e 's/frida-server/sysmond____/g' sysmond || true
          perl -pi -e 's/frida-agent/sysmond-agent/g' sysmond || true
          perl -pi -e 's/re\.frida\.server/re.core.server/g' sysmond || true

          # 签名处理：提取权限或使用兜底权限
          ldid -e "$SERVER_PATH" > ents.xml 2>/dev/null || true
          if [ ! -s ents.xml ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>get-task-allow</key><true/><key>platform-application</key><true/></dict></plist>' > ents.xml
          fi
          ldid -Sents.xml sysmond

      # ===== 4. 打包 DEB =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # Rootful 打包
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          install -m 755 sysmond pkg_rf/usr/bin/sysmond
          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service (security version)
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF
          dpkg-deb -b pkg_rf frida-rootfularm.deb

          # Rootless 打包
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          install -m 755 sysmond pkg_rl/var/jb/usr/bin/sysmond
          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service (security version)
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF
          dpkg-deb -b pkg_rl frida-rootlessarm64.deb

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: frida_src/*.deb

  inspect:
    name: 检测残留特征
    runs-on: macos-14
    needs: build
    steps:
      - name: 下载产物并解包
        uses: actions/download-artifact@v4
        with:
          name: frida-ios-final
      - name: 特征扫描
        run: |
          mkdir out && dpkg-deb -x $(ls *.deb | head -n 1) out
          BIN=$(find out -type f -name sysmond | head -n 1)
          echo "==== 扫描关键词: frida ===="
          strings "$BIN" | grep -i frida | head -n 20 || echo "✅ 未发现明显特征"