name: 构建 Frida iOS（稳定 + USB Only + 双环境 + 轻度高隐匿）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 拉源码 =====
      - name: 拉取源码
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      # ===== 清理 =====
      - name: 清理
        run: |
          cd frida_src
          rm -rf build

      # ===== 配置 =====
      - name: 配置
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools

      # ===== 编译 =====
      - name: 编译
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src
          ninja -C build

      # ===== 安装 dpkg =====
      - name: 安装 dpkg
        run: brew install dpkg

      # ===== 打包 =====
      - name: 打包（稳定 + 轻度高隐匿）
        run: |
          cd frida_src

          SERVER_PATH=$(find build -name frida-server | head -n 1)
          [ -z "$SERVER_PATH" ] && echo "❌ no server" && exit 1

          # ===== 二进制处理 =====
          cp "$SERVER_PATH" sysmond

          # ===== 精准去特征（安全）=====
          perl -pi -e 's/\bfrida-server\b/sysmond____/g' sysmond
          perl -pi -e 's/re\.frida\.server/re.core.server/g' sysmond
          perl -pi -e 's/\bfrida-agent\b/core-agent/g' sysmond
          perl -pi -e 's/\bfrida-helper\b/core-helper/g' sysmond
          perl -pi -e 's/\bFrida\b/CoreDaemon/g' sysmond

          # ===== 端口（可选）=====
          perl -pi -e 's/27042/39042/g' sysmond
          perl -pi -e 's/27043/39043/g' sysmond

          # ===== 权限 & 精简 =====
          chmod 755 sysmond
          strip -x sysmond || true

          # =========================================================
          # ===== rootful（Cydia / iOS14）=====
          # =========================================================
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin

          cp sysmond pkg/usr/bin/sysmond

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-rootfularm.deb

          # =========================================================
          # ===== rootless（iOS15+）=====
          # =========================================================
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/var/jb/usr/bin pkg/usr/bin

          cp sysmond pkg/var/jb/usr/bin/sysmond

          # 兼容直接调用
          ln -sf /var/jb/usr/bin/sysmond pkg/usr/bin/sysmond

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF

          dpkg-deb -b pkg frida-rootlessarm64.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: |
            frida_src/frida-rootful.deb
            frida_src/frida-rootless.deb
