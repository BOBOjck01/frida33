name: Build Frida iOS (Stable + USB Only + Dual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      IOS_CERTID: "-"

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build

      # ✅ 轻量精准裁剪（稳定）
      - name: Safe trim
        run: |
          cd frida_src

          grep -rIl "frida-server" subprojects | xargs -I{} sed -i '' 's/frida-server/internald/g' "{}" || true
          grep -rIl "frida-agent" subprojects | xargs -I{} sed -i '' 's/frida-agent/core-agent/g' "{}" || true
          grep -rIl "frida-helper" subprojects | xargs -I{} sed -i '' 's/frida-helper/core-helper/g' "{}" || true

          sed -i '' 's/re.frida.Helper/re.core.Helper/g' subprojects/frida-core/src/darwin/frida-helper.xcent || true

      # ✅ 关闭端口（USB only）
      - name: Disable TCP
        run: |
          cd frida_src

          sed -i '' 's/default = 27042/default = 0/' subprojects/frida-core/server/server.vala || true
          sed -i '' 's/start_listen (/\/\/start_listen (/g' subprojects/frida-core/server/server.vala || true

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            --disable-frida-python \
            --disable-frida-tools

      - name: Build
        run: |
          cd frida_src
          ninja -C build

      # ✅ 减体积
      - name: Strip
        run: |
          cd frida_src
          find build -type f -perm -111 -exec strip -S {} \; || true

      - name: Install dpkg
        run: |
          brew install dpkg

      - name: Package (dual)
        run: |
          cd frida_src

          SERVER_PATH=$(find build -name frida-server | head -n 1)
          AGENT_PATH=$(find build -name frida-agent.dylib | head -n 1)
          HELPER_PATH=$(find build -name frida-helper | head -n 1)

          if [ -z "$SERVER_PATH" ]; then
            echo "❌ frida-server not found"
            exit 1
          fi

          echo "Using server: $SERVER_PATH"

          # ========= ARM（iOS14 Cydia）=========
          rm -rf pkg
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp "$SERVER_PATH" pkg/usr/bin/internald
          [ -f "$AGENT_PATH" ] && cp "$AGENT_PATH" pkg/usr/lib/frida/ || true
          [ -f "$HELPER_PATH" ] && cp "$HELPER_PATH" pkg/usr/lib/frida/ || true

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # ========= ARM64（iOS16 rootless）=========
          sed -i '' 's/^Architecture: iphoneos-arm$/Architecture: iphoneos-arm64/' pkg/DEBIAN/control
          dpkg-deb -b pkg frida-arm64.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-final
          path: |
            frida_src/frida-arm.deb
            frida_src/frida-arm64.deb
