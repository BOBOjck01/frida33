name: 彻底替换仓库为 Frida 16.6.6 源码（稳定版）

on:
  workflow_dispatch:

jobs:
  replace:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: 1. 拉取当前仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 拉取 Frida 16.6.6 源码
        run: |
          git clone --depth 1 --branch 16.6.6 https://github.com/frida/frida.git tmp_frida
          cd tmp_frida
          git submodule update --init --recursive --depth 1

      - name: 3. 用 Frida 内容重建仓库（关键步骤）
        run: |
          # 删除当前所有文件（包括历史索引）
          rm -rf * .[^.]* || true

          # 拷贝源码
          rsync -a tmp_frida/ .

          # 删除临时目录
          rm -rf tmp_frida

      - name: 4. 重建干净分支（避免 pack 错误）
        run: |
          git checkout --orphan new-main
          git add -A
          git commit -m "chore: replace repository with frida 16.6.6 full source"

      - name: 5. 强推覆盖 main
        run: |
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" new-main:refs/heads/main --force