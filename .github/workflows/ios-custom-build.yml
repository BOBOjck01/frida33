name: Build Custom Frida iOS 16.2.1 (Perfect & USB Safe)

on: workflow_dispatch

jobs:
  build-ios:
    runs-on: macos-14
    env:
      FRIDA_NAME: internald

    steps:
      - name: Clone Frida
        run: git clone --recurse-submodules --depth 1 --branch 16.2.1 https://github.com/frida/frida.git .

      - name: Setup Environment
        run: |
          brew install meson ninja pkg-config dpkg
          python3 -m pip install --upgrade pip setuptools wheel --break-system-packages

      - name: Patch Features
        run: |
          set -e
          find . -type f \( -name "*.c" -o -name "*.vala" -o -name "*.h" \) -exec sed -i '' 's/gum-js-loop/core-js-loop/g' {} + || true
          find . -type f \( -name "*.c" -o -name "*.vala" -o -name "*.h" \) -exec sed -i '' 's/pool-frida/pool-core/g' {} + || true
          find . -type f \( -name "*.c" -o -name "*.vala" -o -name "*.h" \) -exec sed -i '' 's/27042/27088/g' {} + || true

          find subprojects/frida-core/server -name "*.vala" -exec sed -i '' "s/frida-server/${FRIDA_NAME}/g" {} + || true

      - name: Build
        run: |
          make core-ios-arm64
          export MACOSX_DEPLOYMENT_TARGET=11.0
          make core-ios-arm64e

      - name: Package DEBs
        run: |
          set -e
          for arch in arm64 arm64e; do
            mkdir -p deb-$arch/DEBIAN deb-$arch/usr/sbin deb-$arch/usr/lib/frida
            
            cp build/frida-ios-$arch/bin/frida-server deb-$arch/usr/sbin/${FRIDA_NAME}
            cp build/frida-ios-$arch/lib/frida/frida-agent.dylib deb-$arch/usr/lib/frida/
            
            strip deb-$arch/usr/sbin/${FRIDA_NAME} || true
            chmod 755 deb-$arch/usr/sbin/${FRIDA_NAME}

            cat > deb-$arch/DEBIAN/control <<-EOF
          Package: com.custom.${FRIDA_NAME}.${arch}
          Name: ${FRIDA_NAME} (${arch})
          Version: 16.2.1
          Architecture: iphoneos-arm
          Description: Custom Frida (USB Safe)
          Maintainer: Dev
          EOF
            
            dpkg-deb -b deb-$arch ${FRIDA_NAME}_${arch}.deb
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-16.2.1-usb-safe
          path: "*.deb"
