name: Build Frida iOS Stealth (ARM64 + Medium Stealth)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      FRIDA_NAME: internald

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Apply stealth (medium)
        run: |
          cd frida_src

          # 关闭默认端口
          sed -i '' 's/default = 27042/default = 0/' subprojects/frida-core/server/server.vala || true

          # 禁止监听（USB only 强化）
          sed -i '' 's/start_listen (/\/\/start_listen (/g' subprojects/frida-core/server/server.vala || true

          # gum-js-loop -> core-js-loop
          grep -rIl "gum-js-loop" subprojects | xargs -I{} sed -i '' 's/gum-js-loop/core-js-loop/g' "{}" || true

          # frida -> core
          grep -rIl 'default = "frida"' subprojects | xargs -I{} sed -i '' 's/default = "frida"/default = "core"/g' "{}" || true

          # frida-agent -> core-agent
          grep -rIl "frida-agent" subprojects | xargs -I{} sed -i '' 's/frida-agent/core-agent/g' "{}" || true

          # gum 前缀弱化
          grep -rIl "gum-" subprojects | xargs -I{} sed -i '' 's/gum-/core-/g' "{}" || true

          # helper 标识
          sed -i '' 's/re.frida.Helper/re.core.Helper/g' subprojects/frida-core/src/darwin/frida-helper.xcent || true

          # 进程名弱化（基础级）
          grep -rIl "frida-server" subprojects | xargs -I{} sed -i '' 's/frida-server/internald/g' "{}" || true

      - name: Build arm64
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            --builddir=build-arm64 \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

          ninja -C build-arm64
          DESTDIR=build-arm64 ninja -C build-arm64 install

          # strip 符号
          strip -S build-arm64/usr/bin/frida-server || true

      - name: Package DEBs
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp build-arm64/usr/bin/frida-server pkg/usr/bin/$FRIDA_NAME
          cp build-arm64/usr/lib/frida/frida-agent.dylib pkg/usr/lib/frida/
          cp build-arm64/usr/lib/frida/frida-helper pkg/usr/lib/frida/

          # -------- 包1：iphoneos-arm --------
          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: stealth frida (usb only)
          Maintainer: you
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # -------- 包2：iphoneos-arm64 --------
          sed -i '' 's/iphoneos-arm/iphoneos-arm64/g' pkg/DEBIAN/control

          dpkg-deb -b pkg frida-arm64.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-stealth
          path: |
            frida_src/frida-arm.deb
            frida_src/frida-arm64.deb
