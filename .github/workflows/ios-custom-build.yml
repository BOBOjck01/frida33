name: Build Custom Frida iOS (16.2.1 Stealth Multi-Arch)

on: workflow_dispatch

jobs:
  build-ios:
    runs-on: macos-14

    env:
      FRIDA_NAME: internald
      PIPE_NAME: core-js-loop
      PORT_NUMBER: "27088"

    steps:
      - name: Checkout Frida
        uses: actions/checkout@v4
        with:
          repository: frida/frida
          ref: 16.2.1
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          brew install meson ninja pkg-config dpkg
          python -m pip install --upgrade pip setuptools wheel

      # ✅ 修复后的 Patch（关键）
      - name: Patch (Stable Stealth)
        run: |
          set -e
          export LC_ALL=C

          replace() {
            local from=$1
            local to=$2
            grep -rlI "$from" . | while read f; do
              sed -i '' "s/$from/$to/g" "$f"
            done
          }

          echo "[*] 替换特征字符串"

          replace "gum-js-loop" "$PIPE_NAME"
          replace "27042" "$PORT_NUMBER"
          replace "frida:rpc" "core:rpc"
          replace "frida-agent" "core-agent"
          replace "re.frida.server" "re.core.server"
          replace "FridaScriptEngine" "CoreScriptEngine"
          replace "pool-frida" "pool-core"

          echo "[*] 修改 server 名称"
          sed -i '' "s/frida-server/${FRIDA_NAME}/g" subprojects/frida-core/server/server.vala

      # ---------- arm64 ----------
      - name: Build arm64
        run: |
          make core-ios-arm64

          mkdir -p build/dist-arm64
          cp build/frida-ios-arm64/bin/frida-server build/dist-arm64/${FRIDA_NAME}
          cp build/frida-ios-arm64/lib/frida/frida-agent.dylib build/dist-arm64/core-agent.dylib

          strip build/dist-arm64/* || true

      # ---------- arm64e ----------
      - name: Build arm64e
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          make core-ios-arm64e

          mkdir -p build/dist-arm64e
          cp build/frida-ios-arm64e/bin/frida-server build/dist-arm64e/${FRIDA_NAME}
          cp build/frida-ios-arm64e/lib/frida/frida-agent.dylib build/dist-arm64e/core-agent.dylib

          strip build/dist-arm64e/* || true

      # ---------- DEB arm64 ----------
      - name: Package arm64 DEB
        run: |
          mkdir -p deb-arm64/DEBIAN deb-arm64/usr/sbin deb-arm64/usr/lib/frida

          cp build/dist-arm64/${FRIDA_NAME} deb-arm64/usr/sbin/
          cp build/dist-arm64/core-agent.dylib deb-arm64/usr/lib/frida/

          chmod 755 deb-arm64/usr/sbin/${FRIDA_NAME}

          cat > deb-arm64/DEBIAN/control <<EOF
          Package: com.core.${FRIDA_NAME}.arm64
          Name: ${FRIDA_NAME} (arm64)
          Version: 16.2.1
          Architecture: iphoneos-arm
          Description: Custom Frida arm64
          Maintainer: Dev
          EOF

          dpkg-deb -b deb-arm64 ${FRIDA_NAME}_arm64.deb

      # ---------- DEB arm64e ----------
      - name: Package arm64e DEB
        run: |
          mkdir -p deb-arm64e/DEBIAN deb-arm64e/usr/sbin deb-arm64e/usr/lib/frida

          cp build/dist-arm64e/${FRIDA_NAME} deb-arm64e/usr/sbin/
          cp build/dist-arm64e/core-agent.dylib deb-arm64e/usr/lib/frida/

          chmod 755 deb-arm64e/usr/sbin/${FRIDA_NAME}

          cat > deb-arm64e/DEBIAN/control <<EOF
          Package: com.core.${FRIDA_NAME}.arm64e
          Name: ${FRIDA_NAME} (arm64e)
          Version: 16.2.1
          Architecture: iphoneos-arm
          Description: Custom Frida arm64e (A12+)
          Maintainer: Dev
          EOF

          dpkg-deb -b deb-arm64e ${FRIDA_NAME}_arm64e.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-16.2.1-multi
          path: "*.deb"
