name: Build Frida iOS (ARM64 Stable No-Install)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      IOS_CERTID: "-"

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal

      - name: Build
        run: |
          cd frida_src
          ninja -C build

      - name: Debug (确认产物)
        run: |
          cd frida_src
          echo "==== build目录 ===="
          ls build | head -n 50

          echo "==== 查找关键文件 ===="
          find build -name frida-server || true
          find build -name frida-agent.dylib || true
          find build -name frida-helper || true

      - name: Package
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          # ✅ 自动定位
          SERVER_PATH=$(find build -name frida-server | head -n 1)
          AGENT_PATH=$(find build -name frida-agent.dylib | head -n 1)
          HELPER_PATH=$(find build -name frida-helper | head -n 1)

          if [ -z "$SERVER_PATH" ]; then
            echo "❌ frida-server not found"
            exit 1
          fi

          echo "Using server: $SERVER_PATH"
          cp "$SERVER_PATH" pkg/usr/bin/frida-server

          [ -f "$AGENT_PATH" ] && cp "$AGENT_PATH" pkg/usr/lib/frida/ || true
          [ -f "$HELPER_PATH" ] && cp "$HELPER_PATH" pkg/usr/lib/frida/ || true

          cat > pkg/DEBIAN/control <<EOF
          Package: re.frida.server
          Name: frida-server
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: Frida server
          Maintainer: frida
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-arm64
          path: frida_src/frida.deb
