name: Build Frida iOS (ARM64 Clean Stable)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      IOS_CERTID: "-"   # 关键：关闭签名

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build build-out

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal

      - name: Build
        run: |
          cd frida_src
          ninja -C build

      - name: Install
        run: |
          cd frida_src
          DESTDIR=build-out ninja -C build install

      - name: Debug Paths
        run: |
          cd frida_src
          echo "==== find frida-server ===="
          find build-out -name frida-server || true

          echo "==== list build-out ===="
          ls -R build-out | head -n 200

      - name: Package
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          # ✅ 自动定位 frida-server（关键修复）
          SERVER_PATH=$(find build-out -name frida-server | head -n 1)

          if [ -z "$SERVER_PATH" ]; then
            echo "❌ frida-server not found"
            exit 1
          fi

          echo "Using server: $SERVER_PATH"

          cp "$SERVER_PATH" pkg/usr/bin/frida-server

          # agent / helper（存在才复制）
          AGENT_PATH=$(find build-out -name frida-agent.dylib | head -n 1)
          HELPER_PATH=$(find build-out -name frida-helper | head -n 1)

          [ -f "$AGENT_PATH" ] && cp "$AGENT_PATH" pkg/usr/lib/frida/ || true
          [ -f "$HELPER_PATH" ] && cp "$HELPER_PATH" pkg/usr/lib/frida/ || true

          cat > pkg/DEBIAN/control <<EOF
          Package: re.frida.server
          Name: frida-server
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: Frida server
          Maintainer: frida
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-arm64
          path: frida_src/frida.deb
