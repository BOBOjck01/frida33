name: 构建 Frida iOS（稳定 + USB Only + 双环境 + 安全隐匿）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 环境 =====
      - name: 安装依赖
        run: |
          brew install dpkg python || true

      # ===== 拉源码 =====
      - name: 拉取源码
        run: |
          git clone --depth 1 --branch $FRIDA_VERSION --single-branch https://github.com/frida/frida.git frida_src
          cd frida_src
          git submodule update --init --recursive

      # ===== 编译 =====
      - name: 编译
        env:
          IOS_CERTID: "-"
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools

          ninja -C build -j$(sysctl -n hw.ncpu)

      # ===== 二进制处理 =====
      - name: 去特征（Mach-O 安全版）
        run: |
          cd frida_src

          SERVER=$(find build -type f -name frida-server | grep -v "\.a$" | head -n 1)
          [ -z "$SERVER" ] && echo "❌ server not found" && exit 1

          cp "$SERVER" sysmond

          echo "==== BEFORE CHECK ===="
          file sysmond || true
          strings sysmond | grep -i frida || true

          # ===== Mach-O 段级替换 =====
          python3 <<'PY'
import subprocess
from collections import Counter

BIN = "sysmond"

out = subprocess.check_output(
    "otool -l sysmond | awk '/sectname __cstring/{f=1} f&&/offset/{o=$2} f&&/size/{s=$2; print o,s; exit}'",
    shell=True
).decode().strip()

if not out:
    raise SystemExit("cstring not found")

offset, size = map(int, out.split())

with open(BIN, "rb") as f:
    data = bytearray(f.read())

segment = data[offset:offset+size]

strings = []
i = 0
while i < len(segment):
    if segment[i] == 0:
        i += 1
        continue
    start = i
    while i < len(segment) and segment[i] != 0:
        i += 1
    strings.append(bytes(segment[start:i]))

counter = Counter(strings)

print("==== candidates ====")
for s in counter:
    if b"frida" in s.lower():
        print(s, "count=", counter[s])

REPLACE_MAP = {
    b"frida-server": b"sysmond____",
    b"re.frida.server": b"re.core.server_",
}

for old, new in REPLACE_MAP.items():
    if len(old) != len(new):
        raise SystemExit("length mismatch")

    if counter.get(old, 0) != 1:
        print(f"skip {old}, count={counter.get(old,0)}")
        continue

    idx = segment.find(old)
    if idx != -1:
        segment[idx:idx+len(old)] = new
        print(f"patched {old} -> {new}")

data[offset:offset+size] = segment

with open(BIN, "wb") as f:
    f.write(data)

print("==== patch done ====")
PY

          chmod 755 sysmond

          # ===== 精简 =====
          strip -S sysmond || true

          echo "==== AFTER CHECK ===="
          file sysmond || true
          strings sysmond | head -n 5 || true
          strings sysmond | grep -i frida || true

      # ===== 打包 =====
      - name: 打包
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # ---------- rootful ----------
          rm -rf pkg_rf
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          cp sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg_rf frida-rootful.deb

          # ---------- rootless ----------
          rm -rf pkg_rl
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          cp sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          Depends: firmware (>= 15.0)
          EOF

          dpkg-deb -b pkg_rl frida-rootless.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-${{ env.FRIDA_VERSION }}
          path: frida_src/*.deb
