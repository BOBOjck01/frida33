name: Build Frida iOS (ARM64 Stable + Safe Stealth)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Clean
        run: |
          cd frida_src
          rm -rf build

      # ✅ 只做安全隐匿（不会炸）
      - name: Safe stealth
        run: |
          cd frida_src

          # 仅改 server 名
          grep -rIl "frida-server" subprojects | xargs -I{} sed -i '' 's/frida-server/internald/g' "{}" || true
          grep -rIl "re.frida.server" subprojects | xargs -I{} sed -i '' 's/re.frida.server/re.core.server/g' "{}" || true

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            --disable-frida-python \
            --disable-frida-tools

      - name: Build
        run: |
          cd frida_src
          ninja -C build

      - name: Strip
        run: |
          cd frida_src
          find build -type f -perm +111 -exec strip -S {} \; || true

      - name: Install dpkg
        run: |
          brew install dpkg

      - name: Package (dual)
        run: |
          cd frida_src

          SERVER_PATH=$(find build -name frida-server | head -n 1)
          AGENT_PATH=$(find build -name frida-agent.dylib | head -n 1)
          HELPER_PATH=$(find build -name frida-helper | head -n 1)

          if [ -z "$SERVER_PATH" ]; then
            echo "❌ frida-server not found"
            exit 1
          fi

          # ===== ARM 包（给 iOS 14 / Cydia）=====
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/lib/frida

          cp "$SERVER_PATH" pkg/usr/bin/internald
          [ -f "$AGENT_PATH" ] && cp "$AGENT_PATH" pkg/usr/lib/frida/ || true
          [ -f "$HELPER_PATH" ] && cp "$HELPER_PATH" pkg/usr/lib/frida/ || true

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # ===== ARM64 包（给 iOS 16 / rootless）=====
          sed -i '' 's/iphoneos-arm/iphoneos-arm64/g' pkg/DEBIAN/control
          dpkg-deb -b pkg frida-arm64.deb

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-dual
          path: |
            frida_src/frida-arm.deb
            frida_src/frida-arm64.deb
