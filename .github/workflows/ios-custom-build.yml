name: 构建 Frida iOS（极简稳定 + USB Only + 双架构）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 拉源码 =====
      - name: 拉取源码
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      # ===== 清理 =====
      - name: 清理
        run: |
          cd frida_src
          rm -rf build

      # ===== 配置（极简）=====
      - name: 配置
        run: |
          cd frida_src
          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools

      # ===== 只编 server =====
      - name: 编译（仅 server）
        run: |
          cd frida_src
          ninja -C build frida-server

      # ===== 安装 dpkg =====
      - name: 安装 dpkg
        run: brew install dpkg

      # ===== 打包 =====
      - name: 打包（双架构 + 隐匿）
        run: |
          cd frida_src

          SERVER_PATH=$(find build -name frida-server | head -n 1)
          [ -z "$SERVER_PATH" ] && echo "❌ no server" && exit 1

          # ===== 二进制处理 =====
          cp "$SERVER_PATH" internald

          perl -pi -e 's/frida-server/internald/g' internald
          perl -pi -e 's/re\.frida\.server/re.core.server/g' internald

          strip -S internald || true
          strip -x internald || true

          # ===== ARM（iOS14）=====
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin

          cp internald pkg/usr/bin/internald

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # ===== ARM64（iOS16）=====
          rm -rf pkg
          mkdir -p pkg/DEBIAN pkg/usr/bin

          cp internald pkg/usr/bin/internald

          cat > pkg/DEBIAN/control <<EOF
          Package: re.core.server
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm64
          Description: system daemon
          Maintainer: system
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm64.deb

      # ===== 上传 =====
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-minimal
          path: |
            frida_src/frida-arm.deb
            frida_src/frida-arm64.deb
