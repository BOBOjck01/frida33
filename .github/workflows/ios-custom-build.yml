name: Build Frida iOS Stealth (ARM64 FINAL STABLE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"
      FRIDA_NAME: internald

    steps:
      - name: Checkout
        run: |
          git clone https://github.com/frida/frida.git frida_src
          cd frida_src
          git fetch --tags --force
          git checkout tags/$FRIDA_VERSION
          git submodule update --init --recursive

      - name: Apply stealth
        run: |
          cd frida_src
          set +e

          # 端口关闭
          sed -i '' 's/default = 27042/default = 0/' subprojects/frida-core/server/server.vala
          sed -i '' 's/start_listen (/\/\/start_listen (/g' subprojects/frida-core/server/server.vala

          # 安全字符串混淆
          grep -rIl "gum-js-loop" subprojects | xargs -I{} sed -i '' 's/gum-js-loop/core-js-loop/g' "{}"
          grep -rIl 'default = "frida"' subprojects | xargs -I{} sed -i '' 's/default = "frida"/default = "core"/g' "{}"

          # helper 标识
          sed -i '' 's/re.frida.Helper/re.core.Helper/g' subprojects/frida-core/src/darwin/frida-helper.xcent

          # 禁用 codesign（关键）
          sed -i '' 's/codesign/#codesign/g' subprojects/frida-core/tools/post-process.py

          set -e

      - name: Clean
        run: |
          cd frida_src
          rm -rf build build-arm64

      - name: Configure
        run: |
          cd frida_src

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-portal \
            -- \
            -Dfrida-gum:devkits=gum,gumjs \
            -Dfrida-core:compiler_backend=enabled \
            -Dfrida-core:assets=installed \
            -Dfrida-core:devkits=core

      - name: Build
        run: |
          cd frida_src

          ninja -C build || make -j$(sysctl -n hw.ncpu)

          DESTDIR=build-arm64 ninja -C build install || DESTDIR=build-arm64 make install

          strip -S build-arm64/usr/bin/frida-server || true

      - name: Package
        run: |
          cd frida_src

          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/lib/frida

          cp build-arm64/usr/bin/frida-server pkg/usr/bin/$FRIDA_NAME
          cp build-arm64/usr/lib/frida/frida-agent.dylib pkg/usr/lib/frida/
          cp build-arm64/usr/lib/frida/frida-helper pkg/usr/lib/frida/

          # arm
          cat > pkg/DEBIAN/control <<EOF
          Package: com.core.internald
          Name: internald
          Version: $FRIDA_VERSION
          Architecture: iphoneos-arm
          Description: stealth frida
          Maintainer: you
          Section: Development
          Depends: firmware (>= 12.0)
          EOF

          dpkg-deb -b pkg frida-arm.deb

          # arm64
          sed -i '' 's/iphoneos-arm/iphoneos-arm64/g' pkg/DEBIAN/control
          dpkg-deb -b pkg frida-arm64.de