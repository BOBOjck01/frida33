name: 构建 Frida iOS（稳定隐匿版）

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    env:
      FRIDA_VERSION: "16.6.6"

    steps:
      # ===== 1. 环境准备 =====
      - name: 环境准备
        run: |
          brew update
          brew install dpkg ldid

      # ===== 2. 拉源码（精简 + 重试） =====
      - name: 拉取源码
        run: |
          git clone --depth 1 --branch ${{ env.FRIDA_VERSION }} https://github.com/frida/frida.git frida_src
          cd frida_src

          git submodule init releng
          git submodule init subprojects/frida-gum
          git submodule init subprojects/frida-core

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "同步子模块 (第 $i 次)..."
            if git submodule update --init --recursive --depth 1; then
              echo "✅ 成功"
              break
            else
              if [ $i -eq $MAX_RETRIES ]; then exit 1; fi
              sleep 5
            fi
          done

      # ===== 3. 轻量源码优化（安全） =====
      - name: 源码优化（安全级）
        run: |
          cd frida_src

          # 仅关闭 gumjs debug（安全，不影响结构）
          GUM_MESON="subprojects/frida-gum/bindings/gumjs/meson.build"
          if [ -f "$GUM_MESON" ]; then
            sed -i '' "s/debug: true/debug: false/g" "$GUM_MESON" || true
          fi

      # ===== 4. 编译 =====
      - name: 编译
        run: |
          cd frida_src
          rm -rf build

          export IOS_CERTID=-

          ./configure \
            --prefix=/usr \
            --host=ios-arm64 \
            --enable-server \
            --disable-gadget \
            --disable-frida-python \
            --disable-frida-tools \
            -- \
            -Dbuildtype=release \
            -Doptimization=3 \
            -Db_ndebug=true \
            -Dstrip=true \
            -Db_lto=true \
            -Dcpp_rtti=false \

          export IOS_CERTID=-
          ninja -C build -j$(sysctl -n hw.ncpu)

      # ===== 5. 二进制处理（安全隐匿） =====
      - name: 二进制处理
        run: |
          cd frida_src

          SERVER_PATH=$(find ./build -type f -name "frida-server" -exec file {} + | grep "Mach-O" | cut -d: -f1 | head -n 1)
          if [ -z "$SERVER_PATH" ]; then exit 1; fi

          cp "$SERVER_PATH" sysmond

          # strip（核心）
          strip -x sysmond
          strip -S sysmond

          # ⚠️ 等长替换（绝对不能改长度）
          perl -pi -e 's/frida-server/sysmond-serv/g' sysmond
          perl -pi -e 's/frida-agent/sysmond-agent/g' sysmond
          perl -pi -e 's/_frida/_core_/g' sysmond

          # 注入权限
          ldid -e "$SERVER_PATH" > ents.xml 2>/dev/null || true
          if [ ! -s ents.xml ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><plist version="1.0"><dict><key>get-task-allow</key><true/><key>platform-application</key><true/></dict></plist>' > ents.xml
          fi

          ldid -Sents.xml sysmond

      # ===== 6. 打包 =====
      - name: 打包 DEB
        run: |
          cd frida_src
          V=${{ env.FRIDA_VERSION }}

          # Rootful
          mkdir -p pkg_rf/DEBIAN pkg_rf/usr/bin
          cp sysmond pkg_rf/usr/bin/sysmond

          cat > pkg_rf/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm
          Description: system service
          Maintainer: root
          Section: System
          EOF

          dpkg-deb -Zxz -b pkg_rf frida-rootful.deb

          # Rootless
          mkdir -p pkg_rl/DEBIAN pkg_rl/var/jb/usr/bin
          cp sysmond pkg_rl/var/jb/usr/bin/sysmond

          cat > pkg_rl/DEBIAN/control <<EOF
          Package: re.core.server
          Name: sysmond
          Version: $V
          Architecture: iphoneos-arm64
          Description: system service
          Maintainer: root
          Section: System
          EOF

          dpkg-deb -Zxz -b pkg_rl frida-rootless.deb

      # ===== 7. 上传 =====
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-stable
          path: frida_src/*.deb