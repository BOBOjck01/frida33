name: Build Frida iOS Standard

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Frida
        run: |
          git clone --recurse-submodules --depth 1 --branch 16.2.1 https://github.com/frida/frida.git .

      - name: Setup Environment
        run: |
          brew install meson ninja pkg-config dpkg
          python3 -m venv venv
          source venv/bin/activate
          pip install meson ninja setuptools wheel

      - name: Build arm64
        run: |
          source venv/bin/activate
          cd subprojects/frida-core
          # 使用官方提供的 cross-file
          meson setup build-arm64 --cross-file=releng/ios/ios-arm64.txt -Dserver=true -Doptimization=s
          meson compile -C build-arm64

      - name: Build arm64e
        run: |
          source venv/bin/activate
          cd subprojects/frida-core
          export MACOSX_DEPLOYMENT_TARGET=11.0
          meson setup build-arm64e --cross-file=releng/ios/ios-arm64e.txt -Dserver=true -Doptimization=s || true
          meson compile -C build-arm64e || true

      - name: Collect Binaries
        run: |
          mkdir -p output/arm64 output/arm64e
          
          # 提取编译好的二进制文件
          find subprojects/frida-core/build-arm64 -name "frida-server" -exec cp {} output/arm64/ \;
          find subprojects/frida-core/build-arm64 -name "frida-agent.dylib" -exec cp {} output/arm64/ \;
          
          find subprojects/frida-core/build-arm64e -name "frida-server" -exec cp {} output/arm64e/ \; || true
          find subprojects/frida-core/build-arm64e -name "frida-agent.dylib" -exec cp {} output/arm64e/ \; || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-ios-binaries
          path: output/
